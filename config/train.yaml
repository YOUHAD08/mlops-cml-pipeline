# Data split configuration
split:
  test_size: 0.2
  random_state: 42

# Model configuration
model:
  name: random_forest
  n_estimators: 500
  random_state: 42
  n_jobs: -1

# Artifacts
artifacts_dir: artifacts

# CI Matrix configurations
matrix:
  n_estimators: [100, 200, 400]

# Metrics thresholds
thresholds:
  min_accuracy: 0.90
  min_f1: 0.95
